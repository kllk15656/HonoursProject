<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Client Calendar</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
}

/* ===== Page Container ===== */
.page {
  max-width: 1100px;
  margin: auto;
  padding: 30px;
}

/* ===== Progress Bar ===== */
.progress {
  display: flex;
  justify-content: center;
  margin-bottom: 25px;
}

.progress div {
  padding: 10px 15px;
  border-radius: 6px;
  background: #333;
  margin: 0 5px;
}

.progress .active {
  background: #1f7a1f;
}

/* ===== Calendar Layout ===== */
.calendar-layout {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 25px;
}

/* ===== Calendar ===== */
.calendar {
  background: #1c1c1c;
  padding: 20px;
  border-radius: 12px;
}

.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 10px;
}

.day {
  padding: 15px;
  text-align: center;
  border-radius: 8px;
  font-weight: bold;
}

.unavailable {
  background: #7a1f1f;
  cursor: not-allowed;
}

.available {
  background: #1f7a1f;
  cursor: pointer;
}

.available:hover {
  background: #2ecc71;
}

/* ===== Time Panel ===== */
.time-panel {
  background: #1c1c1c;
  padding: 20px;
  border-radius: 12px;
}

.time-panel h3 {
  margin-bottom: 10px;
}

.times {
  max-height: 300px;
  overflow-y: auto;
}

.times button {
  width: 100%;
  padding: 10px;
  margin-bottom: 8px;
  background: #333;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.times button:hover {
  background: #2ecc71;
}
</style>
</head>
<body>

<div class="page">

  <!-- Progress -->
  <div class="progress">
    <div>Services</div>
    <div class="active">Calendar</div>
    <div>Details</div>
    <div>Payment</div>
  </div>

  <!-- Calendar + Time -->
  <div class="calendar-layout">

    <!-- Calendar -->
    <div class="calendar">
      <div class="calendar-header">
        <button>&lt;</button>
        <h2>January 2026</h2>
        <button>&gt;</button>
      </div>

      <div class="calendar-grid" id="calendar"></div>
    </div>

    <!-- Time Slots -->
    <div class="time-panel">
      <h3>Available Times</h3>
      <p id="selected-date">Select a date</p>
      <div class="times" id="times"></div>
    </div>

  </div>
</div>

<script>
const availability = {
  "2026-01-05": ["10:00", "12:00", "15:00"],
  "2026-01-12": ["09:00", "11:00"],
  "2026-01-18": ["13:00", "16:00"],
  "2026-01-27": ["10:30", "14:00"]
};

const calendar = document.getElementById("calendar");
const times = document.getElementById("times");
const selectedDate = document.getElementById("selected-date");

// Generate days
for (let d = 1; d <= 31; d++) {
  const date = `2026-01-${String(d).padStart(2, "0")}`;
  const div = document.createElement("div");
  div.classList.add("day");

  if (availability[date]) {
    div.classList.add("available");
    div.onclick = () => showTimes(date);
  } else {
    div.classList.add("unavailable");
  }

  div.innerText = d;
  calendar.appendChild(div);
}

function showTimes(date) {
  selectedDate.innerText = date;
  times.innerHTML = "";

  availability[date].forEach(t => {
    const btn = document.createElement("button");
    btn.innerText = t;
    times.appendChild(btn);
  });
}
</script>

</body>
</html>
