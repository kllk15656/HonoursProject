<!DOCTYPE html>
<html lang ="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel ="stylesheet" href="./css/settings.css">

</head>

<body>
    <!-- top nav-->
    <div class=" top-nav">
        <h1> Admin Dashboard</h1>
        <ul>
            <li> <a href="Dashboard.html">Dashboard</a></li>
            <li><a href="Setting.html">Settings</a></li>
            <li><a href="Logout.html">Logout</a></li>
        </ul>
    </div>
    <!-- side nav-->
    <div class="side-nav">
        <a href="Admin-Calendar.html">Calendar</a>
        <a href="Categories.html">Categories</a>
        <a href="Services.html">Services</a>
        <a href="Clients.html">Clients</a>
    </div>
    <!-- Main content-->
     <div class="main-content">
        <div class="card">
          <h1>Settings</h1>
     <!-- Business Info -->
    <div class="settings-section">
      <h3>Business Information</h3>
    <div class="form-group">
      <label>Business Name:</label>
      <input type="text">
    </div>

    <div class="form-group">
      <label>Email:</label>
      <input type="email">
    </div>

    <button class="btn-yellow">Save Details</button>
  </div>

  <hr>

  <!-- Password -->
  <div class="settings-section">
    <h3>Password</h3>

    <div class="form-group">
      <label>Current:</label>
      <input type="password">
    </div>

    <div class="form-group">
      <label>New:</label>
      <input type="password">
    </div>

    <div class="form-group">
      <label>Confirm:</label>
      <input type="password">
    </div>

    <button class="btn-yellow">Save Password</button>
  </div>

  <hr>

  <!-- Stripe -->
  <div class="settings-section">
    <h3>Payment Integration (Stripe)</h3>

    <p>Status: 
      <span class="status-dot"></span> Connected
    </p>

    <div class="form-group">
      <label>Stripe account ID:</label>
      <input type="text">
    </div>

    <button class="btn-yellow">Change Stripe Account</button>
  </div>

  <div class="save-all">
    <button class="btn-main">Save All Changes</button>
  </div>

</div>

     </div>
</body>
</html>
