<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=shopping_cart" />
  <link rel="stylesheet" href="./css/service.css" />
  <title>Categories</title>
  <style>
  .material-symbols-outlined {
     font-variation-settings:
     'FILL' 0,
     'wght' 400,
     'GRAD' 0,
     'opsz' 24
}
</style>
  </style>
</head>
<body>

  <!-- Cart and Hamburger Menu -->
  <header>
   <div id="cart-icon">
    <span class="material-symbols-outlined">
shopping_cart
</span>
 
</div>

    <button class="hamburger-menu" id="hamburger-menu">
      &#9776;
    </button>
  </header>

  <!-- List of Categories-->
  <div class="sidebar">
    
    <form action="#" method="GET">
      <input type="text" name="search" placeholder="Search Services..." />
    </form>
    <br>
    
    <div class="categories">
      <h2>Categories</h2><br>
    </div>
  </div>
 <div class="main-content">
    <div class="progress-container">
      <div class="step active">Services</div>
      <div class="arrow">→</div>
      <div class="step uncomplete">Calendar</div>
      <div class="arrow">→</div>
      <div class="step uncomplete">Details</div>
      <div class="arrow">→</div>
      <div class="step uncomplete">Payment</div>
    </div>
    <!-- go back to welcome page-->
     <div style="text-align:center; margin-bottom: 20px;">
      <a href="Welcome.html">
        <button style="background-color: #6c757d; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer;">
          ← Back to Welcome
        </button>
      </a>
    </div>

   <div class="service-header">
    Services
  </div>

  <!-- Services Container Box -->
  <div class="service-container">
    <h1>Our Services</h1>
    <p>Content goes here...</p>
  </div>



  
   <!-- Cart Sidebar -->
  <div id="side-cart">
    
    <div class="cart-panel"> 

    <button id="close-cart">X</button>
    <!-- Cart contents go here -->
    <p>Your cart is empty</p>
    <div class="cart-total">
      <strong> Total Price</strong>
      <Strong> £ 0</Strong>
    </div>
    <button class="continue-btn">Continue</button>
  </div>
</div>

<!-- JAVASCRIPT -->
  
  <script>
    const hamburgerMenu = document.getElementById('hamburger-menu');
    const sidebar = document.querySelector('.sidebar');

    hamburgerMenu.addEventListener('click', () => {
      sidebar.classList.toggle('open');
    });

    document.addEventListener('click', (e) => {
      if (!sidebar.contains(e.target) && e.target !== hamburgerMenu) {
        sidebar.classList.remove('open');
      }
    });

    // Cart toggle functionality
    const cartIcon = document.getElementById('cart-icon');
    const sideCart = document.getElementById('side-cart');
    const closeCart = document.getElementById('close-cart');
    const cartPanel = document.querySelector('.cart-panel');

    // Open cart
    cartIcon.addEventListener('click', (e) => {
      e.stopPropagation(); //Prevents document click
      sideCart.classList.add('open');
    });

    // Close cart
    closeCart.addEventListener('click', (e) => {
      e.stopPropagation();
      sideCart.classList.remove('open');
    });

    sideCart.addEventListener('click',() =>{
      sideCart.classList.remove('open');
    });

    cartPanel.addEventListener('click',(e)=> {
      e.stopPropagation();
    })
  </script>
</body>
</html>
